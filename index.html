      <main>
        <section id="rites">
          <h2>Rites de la Omra étape par étape</h2>
          <ol>
            <li><strong>Ihram au Miqat</strong> — Revêtir les deux pièces d'étoffe blanche (pour les hommes) au lieu de Miqat (Dhul-Hulayfah depuis Médine, Yalamlam depuis le Yémen, Qarn al-Manazil depuis le Najd, Juhfah depuis la Syrie/Égypte/Maghreb, Dhat Irq depuis l'Irak). Prononcer l'intention : « Labbayk Allahumma Umratan ».</li>
            <li><strong>Talbiyah</strong> — Répéter la talbiyah : « Labbayk Allahumma labbayk, labbayka la sharika laka labbayk, innal hamda wan-ni'mata laka wal-mulk, la sharika lak ».</li>
            <li><strong>Tawaf</strong> — Effectuer 7 tours autour de la Kaaba dans le sens antihoraire, en commençant par la Hajar al-Aswad. Prière de deux rak'at au Maqam Ibrahim après le tawaf.</li>
            <li><strong>Zamzam</strong> — Boire de l'eau de Zamzam en faisant face à la Kaaba.</li>
            <li><strong>Sa'i</strong> — Marcher 7 fois entre Safa et Marwa, en commençant par Safa, en souvenir du geste de Hajar (Agar).</li>
            <li><strong>Rasage ou coupe (Tahallul)</strong> — Se raser la tête (hommes) ou se couper une mèche d'environ 2 cm (femmes). Fin de l'état d'ihram.</li>
          </ol>

          <h2>Rites du Hajj étape par étape</h2>
          <ol>
            <li><strong>8 Dhul-Hijjah — Yaum at-Tarwiyah</strong> — Se mettre en état d'ihram et partir vers Mina. Passer la nuit à Mina en priant Dhuhr, Asr, Maghrib, Isha et Fajr.</li>
            <li><strong>9 Dhul-Hijjah — Yaum Arafat</strong> — Se rendre au Mont Arafat pour la wuquf (station). Rester de Dhuhr au coucher du soleil en prière et invocation. C'est le pilier central du Hajj.</li>
            <li><strong>Nuit de Muzdalifah</strong> — Après le coucher du soleil, se rendre à Muzdalifah pour la nuit. Ramasser les galets pour la lapidation des jamarat.</li>
            <li><strong>10 Dhul-Hijjah — Yaum an-Nahr</strong> — Lapider le grand jamarat (7 galets). Sacrifice (Udhiyah). Rasage. Tawaf al-Ifadah. Sa'i.</li>
            <li><strong>Jours de Tashreeq (11-13 Dhul-Hijjah)</strong> — Lapider les trois jamarat (21 galets par jour) à Mina.</li>
            <li><strong>Tawaf al-Wada'</strong> — Tawaf d'adieu avant de quitter la Mecque.</li>
          </ol>

          <h2>Les Miqats — Lieux d'entrée en ihram</h2>
          <ul>
            <li><strong>Dhul-Hulayfah (Abyar Ali)</strong> — Pour les pèlerins venant de Médine et au-delà (Europe, Amérique du Nord)</li>
            <li><strong>Juhfah (Rabigh)</strong> — Pour les pèlerins venant de Syrie, Égypte, Afrique du Nord et du Nord-Ouest</li>
            <li><strong>Qarn al-Manazil</strong> — Pour les pèlerins venant du Najd et des pays du Golfe</li>
            <li><strong>Yalamlam</strong> — Pour les pèlerins venant du Yémen et de l'Inde</li>
            <li><strong>Dhat Irq</strong> — Pour les pèlerins venant d'Irak et d'Iran</li>
          </ul>
        </section>

        <section id="checklist">
          <h2>Checklist de préparation Hajj &amp; Omra</h2>
          <h3>Documents obligatoires</h3>
          <ul>
            <li>Passeport valide au moins 6 mois après la date de retour</li>
            <li>Visa Omra ou Hajj (e-visa sur nusuk.sa ou via agence agréée)</li>
            <li>Carnet de vaccination méningite ACYW135 (Nimenrix / Menveo)</li>
            <li>Billet d'avion aller-retour</li>
            <li>Réservation hôtel confirmée à Makkah (et Médine si étape prévue)</li>
            <li>Photos d'identité récentes (format passeport)</li>
          </ul>
          <h3>Tenue et équipement ihram</h3>
          <ul>
            <li>2 pièces d'étoffe blanche non cousue (hommes) — izaar + rida</li>
            <li>Ceinture ou épingle de sécurité pour l'izaar</li>
            <li>Sandales ouvertes (les chaussettes fermées sont interdites en ihram)</li>
            <li>Tenue de rechange modeste pour la femme (abaya, jilbab)</li>
          </ul>
          <h3>Santé et confort</h3>
          <ul>
            <li>Médicaments personnels + ordonnances traduites en arabe</li>
            <li>Crème solaire indice élevé (chaleur intense à Makkah)</li>
            <li>Spray d'eau minérale (brumisateur)</li>
            <li>Chaussures de marche confortables (des kilomètres de marche quotidiens)</li>
            <li>Bouteille d'eau réutilisable</li>
            <li>Masque chirurgical (foules denses)</li>
          </ul>
          <h3>Spirituel</h3>
          <ul>
            <li>Carnet d'invocations (duas) avec translittération</li>
            <li>Application de comptage de dhikr (tasbih)</li>
            <li>Coran de poche</li>
          </ul>
        </section>

        <section id="invocations">
          <h2>Invocations essentielles — Hajj &amp; Omra</h2>
          <h3>Talbiyah</h3>
          <p><strong>Arabe :</strong> لَبَّيْكَ اللَّهُمَّ لَبَّيْكَ، لَبَّيْكَ لَا شَرِيكَ لَكَ لَبَّيْكَ، إِنَّ الْحَمْدَ وَالنِّعْمَةَ لَكَ وَالْمُلْكَ، لَا شَرِيكَ لَكَ</p>
          <p><strong>Translittération :</strong> Labbayk Allahumma labbayk, labbayka la sharika laka labbayk, innal hamda wan-ni'mata laka wal-mulk, la sharika lak</p>
          <p><strong>Traduction :</strong> Me voici, ô Allah, me voici. Me voici, Tu n'as pas d'associé, me voici. En vérité, la louange, la grâce et la royauté T'appartiennent, Tu n'as pas d'associé.</p>

          <h3>Invocation au début du tawaf</h3>
          <p><strong>Translittération :</strong> Bismillah, Allahu Akbar</p>
          <p><strong>Traduction :</strong> Au nom d'Allah, Allah est le plus Grand.</p>

          <h3>Dua entre la Safa et la Marwa</h3>
          <p><strong>Arabe :</strong> إِنَّ الصَّفَا وَالْمَرْوَةَ مِنْ شَعَائِرِ اللَّهِ</p>
          <p><strong>Traduction :</strong> En vérité, Safa et Marwa font partie des symboles d'Allah.</p>

          <h3>Dua au Mont Arafat</h3>
          <p><strong>Translittération :</strong> La ilaha illallahu wahdahu la sharika lahu, lahul mulku wa lahul hamdu wa huwa 'ala kulli shay'in qadir</p>
          <p><strong>Traduction :</strong> Il n'y a de dieu qu'Allah seul, sans associé. À Lui appartient le royaume et la louange, et Il est Omnipotent.</p>
        </section>

        <section id="visa">
          <h2>Visa Omra et Hajj par nationalité</h2>

          <h3>Visa Omra — France</h3>
          <p>E-visa disponible directement sur nusuk.sa. Délai : 24-72 h. Coût : environ 90 €. Documents requis : passeport, photo, vaccin méningite ACYW135, réservation vol + hôtel.</p>

          <h3>Visa Omra — Maroc</h3>
          <p>Via agence agréée par le Ministère des Habous ou e-visa nusuk.sa. Coût : variable selon agence. Quota Hajj : environ 23 000 places.</p>

          <h3>Visa Omra — Algérie</h3>
          <p>Via agences de voyage agréées par le Ministère des Affaires Religieuses algérien. Le visa individuel Omra est aussi disponible sur nusuk.sa. Quota Hajj : environ 36 000 places.</p>

          <h3>Visa Omra — Tunisie</h3>
          <p>E-visa sur nusuk.sa ou via agences agréées. Quota Hajj : environ 13 000 places.</p>

          <h3>Visa Omra — Belgique</h3>
          <p>E-visa sur nusuk.sa, traitement en 24-72 h. Consulat d'Arabie Saoudite à Bruxelles pour les visas papier.</p>

          <h3>Visa Omra — Canada</h3>
          <p>E-visa sur nusuk.sa. Coût : environ 130 CAD. Délai de traitement : 1 à 5 jours ouvrés.</p>

          <h3>Visa Omra — Royaume-Uni</h3>
          <p>E-visa sur nusuk.sa. Le Royaume-Uni bénéficie d'une procédure simplifiée. Délai : 24-72 h.</p>

          <h3>Visa Omra — Sénégal</h3>
          <p>Via agences agréées par le Commissariat général au Pèlerinage. Quota Hajj : environ 12 000 places.</p>

          <h3>Prérequis communs Hajj</h3>
          <ul>
            <li>Le visa Hajj s'obtient obligatoirement via une mission officielle ou une agence agréée par le pays d'origine</li>
            <li>Le Hajj est soumis à un quota national fixé par l'Arabie Saoudite (1 place pour 1 000 habitants musulmans)</li>
            <li>Condition d'âge : le pèlerin doit être pubère (baligh)</li>
            <li>Condition de santé : apte physiquement ou accompagné d'un mahram pour les femmes de moins de 45 ans</li>
            <li>Vaccins obligatoires : méningite ACYW135, polio si applicable selon le pays d'origine</li>
          </ul>
        </section>

        <section id="faq">
          <h2>Questions fréquentes — Hajj &amp; Omra</h2>
          <dl>
            <dt>Quelle est la différence entre le Hajj et la Omra ?</dt>
            <dd>Le Hajj est le grand pèlerinage, obligatoire une fois dans la vie pour tout musulman qui en a la capacité. La Omra est le petit pèlerinage, non obligatoire, accomplissable toute l'année en quelques heures.</dd>

            <dt>Combien coûte une Omra depuis la France ?</dt>
            <dd>Environ 1 200 à 1 800 € en budget économique (10 jours), 2 000 à 3 500 € en confort, et 4 000 € et plus en premium, selon la saison et la proximité au Haram.</dd>

            <dt>Quel vaccin est obligatoire pour la Omra ?</dt>
            <dd>Le vaccin méningite ACYW135 (Nimenrix ou Menveo) est obligatoire, à faire au moins 10 jours avant le départ.</dd>

            <dt>Peut-on faire la Omra sans agence ?</dt>
            <dd>Oui, depuis le lancement du portail nusuk.sa, le visa Omra s'obtient en ligne sans intermédiaire. Il faut réserver son vol et son hôtel soi-même.</dd>

            <dt>Quelle est la meilleure période pour la Omra ?</dt>
            <dd>Le mois de Ramadan est la période la plus bénie mais aussi la plus chargée. Les mois de Rabi al-Awwal, Rajab et Sha'ban offrent un bon équilibre entre affluence modérée et spiritualité.</dd>
          </dl>
        </section>
